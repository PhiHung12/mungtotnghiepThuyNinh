        function startFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            if (!canvas) return;
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.display = 'block';
            fwRunning = true;

            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                if (AC && !fwAudioCtx) fwAudioCtx = new AC();
            } catch(e) {}

            // ── Âm thanh: lift (vút) + burst (nổ) ──
            function playLift() {
                if (!fwAudioCtx) return;
                try {
                    const dur = 0.9, sr = fwAudioCtx.sampleRate;
                    const osc = fwAudioCtx.createOscillator();
                    const gain = fwAudioCtx.createGain();
                    osc.type = 'sine'; // Sóng sine cực êm
                    osc.frequency.setValueAtTime(150, fwAudioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, fwAudioCtx.currentTime + dur);
                    gain.gain.setValueAtTime(0.025, fwAudioCtx.currentTime); // Âm lượng nhỏ
                    gain.gain.exponentialRampToValueAtTime(0.001, fwAudioCtx.currentTime + dur);
                    osc.connect(gain); gain.connect(fwAudioCtx.destination);
                    osc.start(); osc.stop(fwAudioCtx.currentTime + dur);
                } catch(e) {}
            }

            function playBurst(scale) {
                if (!fwAudioCtx) return;
                try {
                    const dur = 1.2, sr = fwAudioCtx.sampleRate;
                    const buf = fwAudioCtx.createBuffer(1, sr * dur, sr);
                    const d = buf.getChannelData(0);
                    for (let i = 0; i < d.length; i++) {
                        const t = i / sr;
                        d[i] = Math.exp(-t * 15) * (Math.random() * 2 - 1) * 0.35
                              + Math.exp(-t * 25) * Math.sin(6.28 * 300 * t) * 0.25;
                    }
                    const src = fwAudioCtx.createBufferSource();
                    src.buffer = buf;
                    const comp = fwAudioCtx.createDynamicsCompressor();
                    comp.threshold.value = -20; comp.ratio.value = 4;
                    comp.attack.value = 0.001; comp.release.value = 0.25;
                    const gain = fwAudioCtx.createGain();
                    const vol = (scale || 1) * 0.12; // Âm lượng nổ rất nhỏ
                    gain.gain.setValueAtTime(vol, fwAudioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, fwAudioCtx.currentTime + dur);
                    src.connect(comp); comp.connect(gain); gain.connect(fwAudioCtx.destination);
                    src.start();
                } catch(e) {}
            }

            const COLORS = {
                Red: '#ff0043', Green: '#14fc56', Blue: '#1e7fff',
                Purple: '#e60aff', Gold: '#ffbf36', White: '#ffffff',
            };
            const COLOR_LIST = Object.values(COLORS);
            function randColor() { return COLOR_LIST[(Math.random() * COLOR_LIST.length) | 0]; }
            function whiteOrGold() { return Math.random() < 0.5 ? COLORS.Gold : COLORS.White; }

            const activeStar = {}; 
            const starPool = [];
            COLOR_LIST.forEach(c => activeStar[c] = []);

            function addStar(x, y, color, angle, speed, life, vx0, vy0) {
                const s = starPool.pop() || {};
                s.x = x; s.y = y; s.prevX = x; s.prevY = y;
                s.color = color;
                s.speedX = Math.sin(angle) * speed + (vx0 || 0);
                s.speedY = Math.cos(angle) * speed + (vy0 || 0);
                s.life = life; s.fullLife = life;
                s.size = 3;
                s.sparkFreq = 0; s.sparkTimer = 0; s.sparkSpeed = 1;
                s.sparkLife = 750; s.sparkColor = color;
                s.heavy = false;
                s.secondColor = null; s.transitionTime = 0; s.colorChanged = false;
                s.onDeath = null; s.visible = true;
                if (!activeStar[color]) activeStar[color] = [];
                activeStar[color].push(s);
                return s;
            }

            const activeSpark = {};
            const sparkPool = [];
            COLOR_LIST.forEach(c => activeSpark[c] = []);

            function addSpark(x, y, color, angle, speed, life) {
                const s = sparkPool.pop() || {};
                s.x = x; s.y = y; s.prevX = x; s.prevY = y;
                s.color = color;
                s.speedX = Math.sin(angle) * speed;
                s.speedY = Math.cos(angle) * speed;
                s.life = life;
                if (!activeSpark[color]) activeSpark[color] = [];
                activeSpark[color].push(s);
                return s;
            }

            const burstFlashes = [];
            function addBurstFlash(x, y, r) { burstFlashes.push({ x, y, r }); }

            const PI2 = Math.PI * 2;
            function createBurst(count, factory) {
                const R = 0.5 * Math.sqrt(count / Math.PI);
                const C = 2 * R * Math.PI;
                const CH = C / 2;
                for (let i = 0; i <= CH; i++) {
                    const ra = (i / CH) * (Math.PI * 0.5);
                    const rs = Math.cos(ra);
                    const ppr = C * rs;
                    const ai = PI2 / ppr;
                    const ao = Math.random() * ai;
                    for (let j = 0; j < ppr; j++) {
                        factory(ai * j + ao + Math.random() * ai * 0.33, rs);
                    }
                }
            }

            function shellCrysanthemum(size) {
                const color = randColor();
                const glitter = Math.random() < 0.25;
                const pistil = Math.random() < 0.42;
                const pistilColor = pistil ? whiteOrGold() : null;
                const streamers = !pistil && Math.random() < 0.42;
                return {
                    shellSize: size,
                    spreadSize: 300 + size * 100,
                    starLife: 900 + size * 200,
                    starDensity: glitter ? 1.1 : 1.25,
                    color, pistil, pistilColor, streamers,
                    glitter: glitter ? 'light' : '',
                    glitterColor: whiteOrGold(),
                };
            }

            function shellPalm(size) {
                const color = randColor();
                const thick = Math.random() < 0.5;
                return {
                    shellSize: size, color,
                    spreadSize: 250 + size * 75,
                    starDensity: thick ? 0.15 : 0.4,
                    starLife: 1800 + size * 200,
                    glitter: thick ? 'thick' : 'heavy',
                    glitterColor: whiteOrGold(),
                };
            }

            function shellRing(size) {
                const color = randColor();
                const pistil = Math.random() < 0.75;
                return {
                    shellSize: size, ring: true, color,
                    spreadSize: 300 + size * 100,
                    starLife: 900 + size * 200,
                    starCount: 2.2 * PI2 * (size + 1),
                    pistil, pistilColor: whiteOrGold(),
                    glitter: !pistil ? 'light' : '',
                    glitterColor: color === COLORS.Gold ? COLORS.Gold : COLORS.White,
                };
            }

            function shellWillow(size) {
                return {
                    shellSize: size,
                    spreadSize: 300 + size * 100,
                    starDensity: 0.6,
                    starLife: 3000 + size * 300,
                    glitter: 'willow',
                    glitterColor: COLORS.Gold,
                    color: '_INVISIBLE_',
                };
            }

            const shellTypes = [shellCrysanthemum, shellPalm, shellRing, shellWillow];

            function burstShell(opts, x, y) {
                const speed = opts.spreadSize / 96;
                const stdInitY = -opts.spreadSize / 1800;
                let starCount = opts.starCount || Math.max(6, Math.pow(opts.spreadSize / 54, 2) * (opts.starDensity || 1));
                const color = opts.color;
                let sparkFreq, sparkSpeed, sparkLife;
                const glitter = opts.glitter;
                if (glitter === 'light')   { sparkFreq = 400; sparkSpeed = 0.3;  sparkLife = 300; }
                else if (glitter === 'medium') { sparkFreq = 200; sparkSpeed = 0.44; sparkLife = 700; }
                else if (glitter === 'heavy')  { sparkFreq = 80;  sparkSpeed = 0.8;  sparkLife = 1400; }
                else if (glitter === 'thick')  { sparkFreq = 16;  sparkSpeed = 1.65; sparkLife = 1400; }
                else if (glitter === 'willow') { sparkFreq = 120; sparkSpeed = 0.34; sparkLife = 1400; }

                const starLife = opts.starLife || 900;

                function starFactory(angle, speedMult) {
                    const c = color === '_INVISIBLE_' ? COLORS.Gold : (color || randColor());
                    const star = addStar(x, y, c, angle, speedMult * speed,
                        starLife + Math.random() * starLife * 0.125, 0, stdInitY);
                    if (glitter && sparkFreq) {
                        star.sparkFreq = sparkFreq;
                        star.sparkSpeed = sparkSpeed;
                        star.sparkLife = sparkLife;
                        star.sparkColor = opts.glitterColor || c;
                        star.sparkTimer = Math.random() * sparkFreq;
                    }
                    if (opts.secondColor) {
                        star.secondColor = opts.secondColor;
                        star.transitionTime = starLife * (Math.random() * 0.05 + 0.32);
                    }
                }

                if (opts.ring) {
                    const ringAngle = Math.random() * Math.PI;
                    const squash = Math.pow(Math.random(), 2) * 0.85 + 0.15;
                    const cnt = opts.starCount || 40;
                    for (let i = 0; i < cnt; i++) {
                        const a = (PI2 * i / cnt);
                        const sx = Math.sin(a) * speed * squash;
                        const sy = Math.cos(a) * speed;
                        const ns = Math.hypot(sx, sy);
                        const na = Math.atan2(sx, sy) + ringAngle;
                        const st = addStar(x, y, color || randColor(), na, ns,
                            starLife + Math.random() * starLife * 0.125);
                        if (glitter && sparkFreq) {
                            st.sparkFreq = sparkFreq; st.sparkSpeed = sparkSpeed;
                            st.sparkLife = sparkLife; st.sparkColor = opts.glitterColor || color;
                            st.sparkTimer = Math.random() * sparkFreq;
                        }
                    }
                } else {
                    createBurst(starCount, starFactory);
                }

                if (opts.pistil && opts.pistilColor) {
                    burstShell({
                        spreadSize: opts.spreadSize * 0.5,
                        starLife: starLife * 0.6,
                        starDensity: 1.4,
                        color: opts.pistilColor,
                        glitter: 'light',
                        glitterColor: opts.pistilColor === COLORS.Gold ? COLORS.Gold : COLORS.White,
                    }, x, y);
                }

                addBurstFlash(x, y, opts.spreadSize / 4);
            }

            const rockets = [];

            function launchShell(posX, heightFrac) {
                const W = canvas.width, H = canvas.height;
                const hpad = 60, vpad = 50;
                const minHeight = H - H * 0.45;
                const lx = posX * (W - hpad * 2) + hpad;
                const ly = H;
                const burstY = minHeight - heightFrac * (minHeight - vpad);
                const vel = Math.pow((ly - burstY) * 0.04, 0.64);

                const baseSize = 2 + Math.random() * 1.5;
                const shellFn = shellTypes[(Math.random() * shellTypes.length) | 0];
                const opts = shellFn(baseSize);

                rockets.push({
                    x: lx, y: ly,
                    targetX: lx + (Math.random() - 0.5) * 40,
                    targetY: burstY,
                    speedX: (Math.random() - 0.5) * 0.8,
                    speedY: -vel * 12,
                    trail: [],
                    opts,
                    dead: false,
                });
                playLift();
            }

            const W = canvas.width, H = canvas.height;
            const schedule = [];
            // Bắn 55 quả pháo ngẫu nhiên rợp trời trong suốt 18 giây
            for (let i = 0; i < 55; i++) {
                schedule.push({
                    t: Math.random() * 18000, 
                    x: 0.1 + (Math.random() * 0.8),
                    h: 0.55 + (Math.random() * 0.35)
                });
            }

            schedule.forEach(({ t, x, h }) => {
                setTimeout(() => {
                    if (!fwRunning) return;
                    launchShell(x, h);
                }, t);
            });

            const trailCanvas = document.createElement('canvas');
            trailCanvas.width = canvas.width;
            trailCanvas.height = canvas.height;
            const trailCtx = trailCanvas.getContext('2d');
            const mainCtx = canvas.getContext('2d');

            const GRAVITY = 0.9;
            let lastTime = null;
            const TOTAL_MS = 20000; // Tổng thời gian pháo hoa (20 giây)
            const startMs = Date.now();

            function fwTick(now) {
                if (!fwRunning) return;
                const frameTime = lastTime ? Math.min(now - lastTime, 50) : 16.7;
                lastTime = now;
                const timeStep = frameTime;
                const speed = frameTime / 16.7;
                const gAcc = (timeStep / 1000) * GRAVITY;
                const starDrag = 1 - (1 - 0.98) * speed;
                const sparkDrag = 1 - (1 - 0.9) * speed;

                trailCtx.globalCompositeOperation = 'source-over';
                trailCtx.fillStyle = `rgba(0,0,0,${0.175 * speed})`;
                trailCtx.fillRect(0, 0, canvas.width, canvas.height);
                mainCtx.clearRect(0, 0, canvas.width, canvas.height);

                for (let i = rockets.length - 1; i >= 0; i--) {
                    const r = rockets[i];
                    if (r.dead) { rockets.splice(i, 1); continue; }
                    r.trail.push({ x: r.x, y: r.y });
                    if (r.trail.length > 12) r.trail.shift();
                    r.x += r.speedX * speed;
                    r.y += r.speedY * speed;
                    r.speedY += gAcc * 0.6; 

                    if (r.y <= r.targetY || r.speedY >= 0) {
                        r.dead = true;
                        burstShell(r.opts, r.x, r.y);
                        playBurst(0.85 + Math.random() * 0.15);
                    }

                    trailCtx.globalCompositeOperation = 'lighten';
                    for (let ti = 0; ti < r.trail.length - 1; ti++) {
                        const a = (ti / r.trail.length) * 0.7;
                        const pt = r.trail[ti];
                        trailCtx.lineWidth = 2 * (ti / r.trail.length);
                        trailCtx.strokeStyle = ti > r.trail.length * 0.6 ? COLORS.Gold : '#FF6600';
                        trailCtx.globalAlpha = a;
                        trailCtx.beginPath();
                        trailCtx.moveTo(pt.x, pt.y);
                        trailCtx.lineTo(r.trail[ti + 1].x, r.trail[ti + 1].y);
                        trailCtx.stroke();
                    }
                    trailCtx.globalAlpha = 1;
                    mainCtx.beginPath();
                    mainCtx.arc(r.x, r.y, 2, 0, PI2);
                    mainCtx.fillStyle = '#ffffff';
                    mainCtx.globalAlpha = 1;
                    mainCtx.fill();
                }

                for (let i = burstFlashes.length - 1; i >= 0; i--) {
                    const bf = burstFlashes[i];
                    const grad = trailCtx.createRadialGradient(bf.x, bf.y, 0, bf.x, bf.y, bf.r);
                    grad.addColorStop(0.024, 'rgba(255,255,255,1)');
                    grad.addColorStop(0.125, 'rgba(255,160,20,0.2)');
                    grad.addColorStop(0.32,  'rgba(255,140,20,0.11)');
                    grad.addColorStop(1,     'rgba(255,120,20,0)');
                    trailCtx.globalCompositeOperation = 'source-over';
                    trailCtx.fillStyle = grad;
                    trailCtx.fillRect(bf.x - bf.r, bf.y - bf.r, bf.r * 2, bf.r * 2);
                    burstFlashes.splice(i, 1);
                }

                trailCtx.globalCompositeOperation = 'lighten';
                trailCtx.lineWidth = 3;
                trailCtx.lineCap = 'round';
                mainCtx.strokeStyle = '#fff';
                mainCtx.lineWidth = 1;

                let totalActive = rockets.length;
                COLOR_LIST.forEach(color => {
                    const stars = activeStar[color] || [];
                    totalActive += stars.length;
                    trailCtx.strokeStyle = color;
                    trailCtx.beginPath();
                    for (let i = stars.length - 1; i >= 0; i--) {
                        const s = stars[i];
                        s.life -= timeStep;
                        if (s.life <= 0) {
                            if (s.onDeath) s.onDeath(s);
                            stars.splice(i, 1);
                            starPool.push(s);
                            continue;
                        }
                        s.prevX = s.x; s.prevY = s.y;
                        s.x += s.speedX * speed;
                        s.y += s.speedY * speed;
                        s.speedX *= starDrag;
                        s.speedY *= starDrag;
                        s.speedY += gAcc;

                        if (s.secondColor && s.life < s.transitionTime && !s.colorChanged) {
                            s.colorChanged = true;
                            stars.splice(i, 1);
                            s.color = s.secondColor;
                            if (!activeStar[s.color]) activeStar[s.color] = [];
                            activeStar[s.color].push(s);
                            continue;
                        }

                        if (s.sparkFreq) {
                            s.sparkTimer -= timeStep;
                            const burnRate = Math.pow(s.life / s.fullLife, 0.5);
                            while (s.sparkTimer < 0) {
                                s.sparkTimer += s.sparkFreq;
                                addSpark(s.x, s.y, s.sparkColor,
                                    Math.random() * PI2,
                                    Math.random() * s.sparkSpeed * burnRate,
                                    s.sparkLife * 0.8 + Math.random() * s.sparkLife * 0.5);
                            }
                        }

                        if (s.visible) {
                            trailCtx.moveTo(s.x, s.y);
                            trailCtx.lineTo(s.prevX, s.prevY);
                        }
                    }
                    trailCtx.stroke();
                });

                trailCtx.lineWidth = 0.75;
                trailCtx.lineCap = 'butt';
                COLOR_LIST.forEach(color => {
                    const sparks = activeSpark[color] || [];
                    totalActive += sparks.length;
                    trailCtx.strokeStyle = color;
                    trailCtx.beginPath();
                    for (let i = sparks.length - 1; i >= 0; i--) {
                        const s = sparks[i];
                        s.life -= timeStep;
                        if (s.life <= 0) { sparks.splice(i, 1); sparkPool.push(s); continue; }
                        s.prevX = s.x; s.prevY = s.y;
                        s.x += s.speedX * speed;
                        s.y += s.speedY * speed;
                        s.speedX *= sparkDrag;
                        s.speedY *= sparkDrag;
                        s.speedY += gAcc;
                        trailCtx.moveTo(s.x, s.y);
                        trailCtx.lineTo(s.prevX, s.prevY);
                    }
                    trailCtx.stroke();
                });

                mainCtx.globalAlpha = 1;
                mainCtx.globalCompositeOperation = 'source-over';
                mainCtx.drawImage(trailCanvas, 0, 0);

                const elapsed = Date.now() - startMs;
                if (elapsed < TOTAL_MS || totalActive > 0) {
                    fwRAF = requestAnimationFrame(fwTick);
                } else {
                    fwRunning = false;
                    let alpha = 1;
                    const fadeOut = setInterval(() => {
                        alpha -= 0.05;
                        canvas.style.opacity = Math.max(0, alpha);
                        if (alpha <= 0) {
                            clearInterval(fadeOut);
                            canvas.style.display = 'none';
                            canvas.style.opacity = '';
                            mainCtx.clearRect(0, 0, canvas.width, canvas.height);
                        }
                    }, 40);
                }
            }

            if (fwRAF) { cancelAnimationFrame(fwRAF); }
            fwRAF = requestAnimationFrame(fwTick);
        }

        function goToLetterPage(dir) {
            if (isTyping) return;
            const next = currentLetterPage + dir;
            if (next < 0 || next >= LETTER_PAGES.length) return;
            const letterFrame   = document.getElementById('cupid-letter-frame');
            const letterContent = letterFrame?.querySelector('.letter-content');
            const imgEl         = document.getElementById('letterInlineImage');
            const wrap          = document.getElementById('letterImageWrap');
            if (!letterContent) return;
            if (imgEl && wrap && wrap.style.display !== 'none') {
                imgEl.classList.add('img-flip-out');
                setTimeout(() => {
                    imgEl.classList.remove('img-flip-out');
                    imgEl.classList.add('img-flip-in');
                    setTimeout(() => imgEl.classList.remove('img-flip-in'), 350);
                }, 300);
            }
            letterContent.style.transition = 'opacity 0.25s ease';
            letterContent.style.opacity = '0';
            setTimeout(() => {
                currentLetterPage = next;
                letterContent.textContent = '';
                letterContent.classList.remove('typing-complete');
                letterContent.style.opacity = '1';
                if (wrap) { wrap.style.display = 'none'; wrap.classList.remove('visible'); }
                if (imgEl) { imgEl.src = ''; }
                const cursor = document.createElement('span');
                cursor.className = 'letter-cursor';
                letterContent.appendChild(cursor);
                startLetterTypingEffect(letterContent, cursor);
            }, 300);
        }

        function spawnHeartParticles() {
            const hearts = ['❤️','💕','💗','💖','🌸','✨'];
            for (let i = 0; i < 22; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'letter-heart-particle';
                    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    el.style.left = (10 + Math.random() * 80) + 'vw';
                    el.style.top  = (-30 + Math.random() * 20) + 'px';
                    el.style.fontSize = (16 + Math.random() * 18) + 'px';
                    el.style.animationDuration = (2.5 + Math.random() * 2) + 's';
                    el.style.animationDelay = (Math.random() * 0.5) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 5500);
                }, i * 90);
            }
        }

        function handleLetterEnvelopeClick() {
            if (cupidLetterState !== 'letterImage') return;
            cupidLetterState = 'showingLetter';
            currentLetterPage = 0;
            isTyping = false;
            if (typeof startBgMusic === 'function') {
                try { startBgMusic(); } catch (_) {}
            }
            switchToLetterMusic();
            document.getElementById('letter-envelope-img')?.classList.remove('visible');
            const letterFrame = document.getElementById('cupid-letter-frame');
            const letterContent = letterFrame?.querySelector('.letter-content');
            const letterImageWrap = document.getElementById('letterImageWrap');
            const letterInlineImage = document.getElementById('letterInlineImage');
            const letterPageNav = document.getElementById('letter-page-nav');
            if (letterImageWrap && letterInlineImage) {
                letterImageWrap.style.display = 'none';
                letterImageWrap.classList.remove('visible');
                letterInlineImage.src = '';
            }
            if (letterPageNav) letterPageNav.classList.remove('visible');

                nextBtn.dataset.bound = '1';
                nextBtn.addEventListener('click', () => goToLetterPage(1));
            }
            const imgEl = document.getElementById('letterInlineImage');
            if (imgEl && !imgEl.dataset.bound) {
                imgEl.dataset.bound = '1';
                imgEl.addEventListener('click', () => goToLetterPage(1));
            }
        }

        async function startSpherePhase() {
            if (enableMorphEffect) {
                await sleep(3400);
            } else {
                await sleep(0);
            }
            const overlay = document.getElementById('transition-overlay');
            overlay.style.opacity = '1';
            await sleep(400);

            removeMorphImageOverlay();
            if (particleSystem) { scene.remove(particleSystem); particlesGeometry.dispose(); particlesMaterial.dispose(); }
            particleSystem = null; particleCount = 0;
            if (backgroundParticleSystem) {
                scene.remove(backgroundParticleSystem);
                backgroundParticlesGeometry.dispose();
                backgroundParticlesMaterial.dispose();
                backgroundParticleSystem = null;
                backgroundParticlesGeometry = null;
                backgroundParticlesMaterial = null;
                backgroundSourcePositions = null;
            }
            scene.fog = null;
            scene.background = new THREE.Color(0x000000);
            bloomPass.strength = 0; bloomPass.threshold = 1;
            renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

            camera.fov = 75; camera.updateProjectionMatrix();
            if (isMobileSP) {
                camera.position.set(0, 0, 16);
            } else {
                camera.position.set(0, 0, 10);
            }
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
            controls.enableRotate = false; controls.enableZoom = true; controls.enablePan = false;
            controls.minDistance = isMobileSP ? 5 : 6; controls.maxDistance = isMobileSP ? 24 : 18;
            controls.autoRotate = false;
            controls.minPolarAngle = Math.PI * 0.25; controls.maxPolarAngle = Math.PI * 0.75;
            controls.minAzimuthAngle = -Math.PI * 0.45; controls.maxAzimuthAngle = Math.PI * 0.45;
            controls.update();

            document.getElementById('start-wrap').style.display = 'none';
            document.getElementById('ui').style.display = 'none';

            spGroup = new THREE.Group(); scene.add(spGroup);
            spClickSphere = new THREE.Mesh(
                new THREE.SphereGeometry(SP_RADIUS * 1.1, 32, 32),
                new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false })
            );
            spClickSphere.renderOrder = -1; scene.add(spClickSphere);
            spRaycaster = new THREE.Raycaster(); spMouse = new THREE.Vector2();

            const sCnt = 600, sPos = new Float32Array(sCnt*3), sCol = new Float32Array(sCnt*3);
            for (let i = 0; i < sCnt; i++) {
                const t2 = Math.random()*Math.PI*2, p2 = Math.acos(2*Math.random()-1), r2 = SP_RADIUS*1.2+Math.random()*3;
                sPos[i*3]=r2*Math.sin(p2)*Math.cos(t2); sPos[i*3+1]=r2*Math.cos(p2); sPos[i*3+2]=r2*Math.sin(p2)*Math.sin(t2);
                sCol[i*3]=1; sCol[i*3+1]=0.4+Math.random()*0.3; sCol[i*3+2]=0.7+Math.random()*0.3;
            }
            const sGeo = new THREE.BufferGeometry();
            sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
            sGeo.setAttribute('color', new THREE.BufferAttribute(sCol, 3));
            spParticlesMesh = new THREE.Points(sGeo, new THREE.PointsMaterial({ size: 0.04, vertexColors: true, transparent: true, opacity: 0.8 }));
            scene.add(spParticlesMesh);

            const rPos = new Float32Array(SP_RAIN_COUNT*3), rCol = new Float32Array(SP_RAIN_COUNT*3);
            for (let i = 0; i < SP_RAIN_COUNT; i++) {
                rPos[i*3]=(Math.random()-.5)*2*SP_FLYOUT_BOUND; rPos[i*3+1]=-SP_FLYOUT_BOUND+Math.random()*2*SP_FLYOUT_BOUND; rPos[i*3+2]=(Math.random()-.5)*2*SP_FLYOUT_BOUND;
                rCol[i*3]=1; rCol[i*3+1]=0.4+Math.random()*0.3; rCol[i*3+2]=0.7+Math.random()*0.3;
            }
            spRainPositions = rPos;
            const rGeo = new THREE.BufferGeometry();
            rGeo.setAttribute('position', new THREE.BufferAttribute(rPos, 3));
            rGeo.setAttribute('color', new THREE.BufferAttribute(rCol, 3));
            spRainMesh = new THREE.Points(rGeo, new THREE.PointsMaterial({ size: 0.035, vertexColors: true, transparent: true, opacity: 0.75 }));
            spRainMesh.renderOrder = 998; scene.add(spRainMesh);

            const bg = document.getElementById('sphere-particles-bg');
            for (let i = 0; i < 30; i++) {
                const d = document.createElement('div'); d.className = 'sp-particle';
                d.style.left = Math.random()*100+'%'; d.style.animationDelay = Math.random()*15+'s';
                d.style.animationDuration = (10+Math.random()*10)+'s'; bg.appendChild(d);
            }
            bg.style.opacity = '1';

            const loader = new THREE.TextureLoader(); loader.crossOrigin = 'anonymous';
            Promise.all(SPHERE_IMAGES.map(url => new Promise(res => loader.load(url, res, undefined, () => res(null)))))
            .then(textures => {
                spTextures = [];
                spSphereImageUrls = [];
                SPHERE_IMAGES.forEach((url, i) => { if (textures[i]) { spTextures.push(textures[i]); spSphereImageUrls.push(url); } });
                if (!spTextures.length) {
                    const fc = document.createElement('canvas'); fc.width = fc.height = 64;
                    fc.getContext('2d').fillStyle = '#ff69b4'; fc.getContext('2d').fillRect(0,0,64,64);
                    spTextures = [new THREE.CanvasTexture(fc)];
                    spSphereImageUrls = [];
                }
                spTextures.forEach(t => { t.colorSpace = THREE.LinearSRGBColorSpace; t.needsUpdate = true; });
                spBuildSphere();
                spPhase = true;

                const canvasEl = renderer.domElement;
                function spDown(e) { const c = e.touches?.[0]||e; spMouseDownX=c.clientX; spMouseDownY=c.clientY; spIsPointerDown=true; spWasDrag=false; }
                function spMove(e) { const c = e.touches?.[0]||e; if (spIsPointerDown) { if (Math.hypot(c.clientX-spMouseDownX,c.clientY-spMouseDownY)>SP_DRAG_THRESHOLD) spWasDrag=true; } }
                function spUp() { spIsPointerDown=false; }
                canvasEl.addEventListener('mousedown', spDown); canvasEl.addEventListener('mouseup', spUp);
                canvasEl.addEventListener('mouseleave', spUp); canvasEl.addEventListener('mousemove', spMove);
                canvasEl.addEventListener('click', e => spHandleTap(e.clientX, e.clientY));
                canvasEl.addEventListener('touchstart', spDown, {passive:true}); canvasEl.addEventListener('touchmove', spMove, {passive:true});
                canvasEl.addEventListener('touchend', e => { spUp(); if(e.cancelable)e.preventDefault(); const c=e.changedTouches[0]; spHandleTap(c.clientX,c.clientY); }, {passive:false});

                document.getElementById('btn-flying-corner').addEventListener('click', () => {
                    if (!spIsExploded || spIsFinalFlyUp) return;
                    spIsFinalFlyUp = true; spFinalFlyUpStartTime = Date.now();
                    document.getElementById('sphere-click-hint').classList.remove('visible');
                    document.getElementById('btn-flying-corner').classList.remove('visible');
                    bg.style.opacity = '0';
                    startCupidLetterSequence();
                });

                overlay.style.opacity = '0';
            });
        }

        function updateSpherePhase() {
            spTime += 0.01;
            if (spIntroComplete && !spHintClickShown && spIntroCompleteTime > 0 && (Date.now()-spIntroCompleteTime) >= SP_HINT_DELAY_MS) { spHintClickShown=true; spShowHint('Click vào nhé'); }
            if (spHasZoomedIn && !spIsExploded && !spHintFlyShown && spZoomInTime > 0 && (Date.now()-spZoomInTime) >= SP_HINT_DELAY_MS) { spHintFlyShown=true; spShowHint('Click lần nữa nào'); }
            if (spRainMesh && spRainPositions) {
                const n = spRainPositions.length/3;
                for (let j = 0; j < n; j++) {
                    spRainPositions[j*3+1] += SP_RAIN_SPEED;
                    if (spRainPositions[j*3+1] > 6) { spRainPositions[j*3+1]=-SP_FLYOUT_BOUND; spRainPositions[j*3]=(Math.random()-.5)*2*SP_FLYOUT_BOUND; spRainPositions[j*3+2]=(Math.random()-.5)*2*SP_FLYOUT_BOUND; }
                }
                spRainMesh.geometry.attributes.position.needsUpdate = true;
            }
            if (spIsExploded) {
                spExplosionProgress = Math.min(1, spExplosionProgress+0.018);
                spFadeProgress = Math.min(1, spFadeProgress+0.04);
                spGroup.children.forEach(child => { if (child.material) { child.material.opacity = Math.max(0, 1-spFadeProgress); if (child.material.opacity<=0) child.visible=false; } });
                spClickSphere.visible = false;
                if (spFloatingGroup) { spDriftTiltAngle+=spDriftTiltDir*0.0003; if(spDriftTiltAngle>=0.25){spDriftTiltAngle=0.25;spDriftTiltDir=-1;}else if(spDriftTiltAngle<=-0.25){spDriftTiltAngle=-0.25;spDriftTiltDir=1;} spFloatingGroup.rotation.y=spDriftTiltAngle; }
                const maxY=10, minY=-10, fMaxY=25;
                spFloatingImages.forEach((img, idx) => {
                    const d=img.userData, dp=Math.max(0,(spExplosionProgress-d.delay)/(1-d.delay));
                    if (dp>0) {
                        const t=Math.min(1,dp), eased=1-Math.pow(1-t,2);
                        const fY=spIsFinalFlyUp?0:Math.sin(spTime*2*d.floatSpeedY+d.floatPhase)*d.floatAmplY;
                        const elapsed=(Date.now()-spExplosionStartTime)/1000;
                        const FAST=isMobileSP?25:18, FTAPER=isMobileSP?4:2.5, TEND=isMobileSP?7:5;
                        let dm=spIsFinalFlyUp?80:(elapsed<FTAPER?FAST:(elapsed<TEND?FAST-(FAST-1)*(elapsed-FTAPER)/(TEND-FTAPER):1));
                        d.basePos.y+=d.driftSpeed*dm;
                        if (eased<1) { img.position.x=d.startPos.x+(d.targetPos.x-d.startPos.x)*eased; img.position.z=d.startPos.z+(d.targetPos.z-d.startPos.z)*eased; img.position.y=d.startPos.y+(d.targetPos.y-d.startPos.y)*eased+(d.basePos.y-d.targetPos.y)+fY; }
                        else { img.position.x=d.basePos.x; img.position.y=d.basePos.y+fY; img.position.z=d.baseZ; }
                        if (spIsFinalFlyUp) { if(d.basePos.y>=fMaxY) img.visible=false; }
                        else { if (d.basePos.y>maxY) { d.basePos.y=minY; d.basePos.x=(Math.random()-.5)*16; d.baseZ=(Math.random()-.5)*16; img.position.x=d.basePos.x; img.position.z=d.baseZ; } }
                        const op=Math.min(1,dp*2), gp=0.65+Math.sin(spTime*3+idx*0.5)*0.25;
                        d.iMat.opacity=op;
                        if (!d.noGlow && d.gMat && d.goMat) { d.gMat.opacity=Math.min(1,op*gp); d.goMat.opacity=Math.min(1,op*gp*0.75); }
                    }
                });
            } else if (spIntroComplete) {
                if (spNeedZoomIn) { camera.position.lerp(spZoomInTarget, 0.08); if (camera.position.distanceTo(controls.target)<=controls.minDistance+0.05) spNeedZoomIn=false; }
                spGroup.rotation.y += 0.001;
                if (spParticlesMesh) { spParticlesMesh.rotation.y+=0.0005; spParticlesMesh.rotation.x+=0.00025; }
            }
            if (!spIntroComplete && spIntroStartTime > 0 && spMeshes.length > 0) {
                const elapsed = Date.now()-spIntroStartTime, dur = SP_INTRO_DURATION_MS/1000;
                spMeshes.forEach(mesh => {
                    const delay=(mesh.userData.introDelay||0)/1000, t=Math.min(1,Math.max(0,(elapsed/1000-delay)/dur));
                    const eased=1-Math.pow(1-t,1.4);
                    mesh.position.lerpVectors(mesh.userData.introStartPos, new THREE.Vector3(0,0,0), eased);
                    if (mesh.material) mesh.material.opacity=1;
                });
                if (elapsed > SP_INTRO_DURATION_MS + SP_INTRO_STAGGER_MS) {
                    spIntroComplete=true; spIntroCompleteTime=Date.now();
                    spMeshes.forEach(m => { m.position.set(0,0,0); if(m.material){m.material.opacity=1;m.visible=true;} });
                }
            }
        }

        (function applyCfgToDOM() {
            const title = (enableWebsiteInfo && cfg.appTitle) ? cfg.appTitle : 'Món Quà Nhỏ';
            document.title = title;
            const metaTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
            if (metaTitle) metaTitle.content = title;

            const iconSrc = (enableWebsiteInfo && cfg.appIcon) ? cfg.appIcon : 'assets/images/icons/couple.png';
            document.querySelectorAll('link[rel*="apple-touch-icon"], link[rel="icon"]').forEach(el => el.href = iconSrc);

            const passcodeTitle = document.querySelector('.passcode-title');
            const passcodeSubtitle = document.querySelector('.passcode-subtitle');
            if (passcodeTitle && cfg.passcodeTitle) passcodeTitle.textContent = cfg.passcodeTitle;
            if (passcodeSubtitle && cfg.passcodeSubtitle) passcodeSubtitle.textContent = cfg.passcodeSubtitle;
        })();

        (function() {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isIOS) return;
            var link = document.createElement('link');
            link.rel = 'manifest'; link.id = 'linkManifest';
            document.head.appendChild(link);
            var iconSrc = cfg.appIcon || 'assets/images/icons/couple.png';
            var iconUrl = new URL(iconSrc, window.location.href).href;
            var name = cfg.appTitle || 'Món Quà Nhỏ';
            var manifest = {
                name, short_name: name,
                description: 'Món quà đặc biệt dành riêng cho bạn',
                start_url: './', display: 'standalone', orientation: 'portrait',
                background_color: '#1b0a1c', theme_color: '#1b0a1c', scope: './',
                icons: [
                    { src: iconUrl, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
                    { src: iconUrl, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
                ]
            };
            try {
                var blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
                link.href = URL.createObjectURL(blob);
            } catch(e) {}
        })();

        const defaultMusicUrl = 'assets/music/bgmucsic.mp3';
        let bgMusicSrc = cfg.bgMusic || defaultMusicUrl;
        if (typeof bgMusicSrc === 'string' && bgMusicSrc.trim().startsWith('data:')) {
            try {
                const arr = bgMusicSrc.split(',');
                const mime = (arr[0].match(/:(.*?);/) || [])[1] || 'audio/mpeg';
                const bstr = atob(arr[1] || '');
                const u8 = new Uint8Array(bstr.length);
                for (let i = 0; i < bstr.length; i++) u8[i] = bstr.charCodeAt(i);
                const blob = new Blob([u8], { type: mime });
                bgMusicSrc = URL.createObjectURL(blob);
            } catch (e) {
                console.warn('Không chuyển được nhạc data URL sang blob, dùng URL gốc:', e);
            }
        }
        const bgMusic = new Audio(bgMusicSrc);
        bgMusic.loop = true;
        bgMusic.volume = typeof cfg.bgVolume === 'number' ? cfg.bgVolume : 0.55;
        bgMusic.preload = 'auto';

        function startBgMusic() {
            var vol = typeof cfg.bgVolume === 'number' ? cfg.bgVolume : 0.55;
            try {
                bgMusic.currentTime = 0;
                bgMusic.volume = 0;
                bgMusic.volume = vol;
                const p = bgMusic.play();
                if (p && typeof p.catch === 'function') {
                    p.catch(function (err) {
                        console.warn('Không thể phát nhạc nền (thử nhạc mặc định):', err);
                        if (bgMusic.src !== defaultMusicUrl && !String(bgMusic.src || '').includes(defaultMusicUrl)) {
                            bgMusic.src = defaultMusicUrl;
                            bgMusic.load();
                            bgMusic.play().catch(function () {});
                        }
                    });
                }
            } catch (e) {
                console.warn('Không thể phát nhạc nền:', e);
            }
        }
        function stopBgMusic() {
            try {
                bgMusic.pause();
                bgMusic.currentTime = 0;
            } catch (e) {
                console.warn('Không thể dừng nhạc nền:', e);
            }
        }

        const letterMusicSrc = cfg.letterMusic || '';
        const letterMusic = letterMusicSrc ? new Audio(letterMusicSrc) : null;
        if (letterMusic) {
            letterMusic.loop = true;
            letterMusic.volume = 0;
            letterMusic.preload = 'auto';
        }
        let _letterMusicFadeTimer = null;

        function switchToLetterMusic() {
            if (!letterMusic) return; 
            const targetVol = typeof cfg.letterVolume === 'number' ? cfg.letterVolume : 0.65;
            const bgVol0 = bgMusic.volume;
            const steps = 20, interval = 50; 
            let step = 0;
            clearInterval(_letterMusicFadeTimer);
            _letterMusicFadeTimer = setInterval(() => {
                step++;
                const ratio = step / steps;
                try { bgMusic.volume = Math.max(0, bgVol0 * (1 - ratio)); } catch(_) {}
                if (step >= steps) {
                    clearInterval(_letterMusicFadeTimer);
                    try { bgMusic.pause(); } catch(_) {}
                    letterMusic.currentTime = 0;
                    letterMusic.volume = 0;
                    letterMusic.play().catch(() => {});
                    let s2 = 0;
                    _letterMusicFadeTimer = setInterval(() => {
                        s2++;
                        try { letterMusic.volume = Math.min(targetVol, targetVol * (s2 / steps)); } catch(_) {}
                        if (s2 >= steps) clearInterval(_letterMusicFadeTimer);
                    }, interval);
                }
            }, interval);
        }

        const PASSCODE = cfg.passcode || '1009';
        let passcodeInput = '';

        const passcodeScreen = document.getElementById('passcodeScreen');
        const passcodeDots = document.getElementById('passcodeDots');
        const passcodeBears = document.getElementById('passcodeBears');
        const bearLeft = document.getElementById('bearLeft');
        const bearRight = document.getElementById('bearRight');

        if (!enablePasscode) {
            passcodeScreen.style.display = 'none';
            init();
        } else {
            passcodeScreen.classList.add('visible');
        }

        function updatePasscodeDots() {
            const dots = passcodeDots.querySelectorAll('.passcode-dot');
            dots.forEach((dot, i) => {
                dot.classList.remove('filled', 'error');
                if (i < passcodeInput.length) dot.classList.add('filled');
            });
        }

        function updateBearPosition() {
            const pos = passcodeInput.length;
            bearLeft.className = `passcode-bear left pos-${pos}`;
            bearRight.className = `passcode-bear right pos-${pos}`;
        }

        function showPasscodeError() {
            const dots = passcodeDots.querySelectorAll('.passcode-dot');
            dots.forEach(d => d.classList.add('error'));
            bearLeft.className = 'passcode-bear left pos-0';
            bearRight.className = 'passcode-bear right pos-0';
            setTimeout(() => {
                passcodeInput = '';
                dots.forEach(d => d.classList.remove('filled', 'error'));
            }, 500);
        }

        function openGift() {
            passcodeBears.classList.add('show-couple');
            setTimeout(() => {
                passcodeScreen.classList.add('hiding');
                setTimeout(() => {
                    passcodeScreen.classList.remove('visible', 'hiding');
                    passcodeBears.classList.remove('show-couple');
                    init();
                }, 500);
            }, 2200);
        }

        document.querySelectorAll('.passcode-btn[data-num]').forEach(btn => {
            btn.addEventListener('click', () => {
                if (passcodeInput.length >= 4) return;
                passcodeInput += btn.dataset.num;
                updatePasscodeDots();
                updateBearPosition();
                if (passcodeInput.length === 4) {
                    if (passcodeInput === PASSCODE) {
                        openGift();
                    } else {
                        showPasscodeError();
                    }
                }
            });
        });

        document.getElementById('passcodeCancel').addEventListener('click', () => {
            passcodeInput = '';
            updatePasscodeDots();
            updateBearPosition();
        });

        passcodeScreen.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

        document.getElementById('letter-envelope-img')?.addEventListener('click', handleLetterEnvelopeClick);

        })(); 
    </script> 
</body>
