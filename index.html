<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Món Quà Nhỏ">
    <link rel="apple-touch-icon" href="assets/images/icons/couple.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/icons/couple.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/images/icons/couple.png">
    <link rel="apple-touch-icon" sizes="120x120" href="assets/images/icons/couple.png">
    <link rel="icon" type="image/png" href="assets/images/icons/couple.png">
    <meta name="theme-color" content="#1b0a1c">
    <title>Món Quà Nhỏ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Dancing+Script:wght@400;500;600;700&family=Pacifico&display=swap">
</head>
<body>
    <style>
        /* Font local cho lá thư — tránh lỗi font trên iOS khi không load được Google Fonts */
        @font-face {
            font-family: "PacificoLocal";
            src: url("assets/fonts/Pacifico-Regular.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        body {
            margin: 0;
            overflow: hidden;
            min-height: 100vh;
            min-height: 100svh;
            min-height: 100dvh;
            background-color: #000000; 
            color: white; 
            font-family: "Pacifico", cursive;
            /* Safe-area cho màn notch / home indicator */
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        canvas {
            display: block; 
            width: 100%; 
            height: 100%; 
        }
        #ui {
            display: none;
        }
        #info {
            font-size: 22px;
            letter-spacing: 2px;
            padding: 10px 24px; 
            background-color: rgba(60, 20, 45, 0.5); 
            border-radius: 10px; 
            display: inline-block;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8); 
            border: 1px solid rgba(255, 182, 193, 0.25); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            transition: opacity 0.4s ease; 
            min-height: 20px;
        }
        #start-wrap {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: transform 0.2s ease;
        }
        #start-wrap.held {
            transform: translateX(-50%) scale(1.05);
        }
        #start-label {
            font-family: "Pacifico", cursive;
            color: rgba(255, 182, 193, 0.85);
            font-size: 13px;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
            letter-spacing: 1px;
        }
        #start-wrap svg {
            width: 68px;
            height: 68px;
            filter: drop-shadow(0 0 8px rgba(255, 105, 180, 0.45));
        }
        .ring-pulse {
            fill: rgba(255, 105, 180, 0.1);
            animation: ringPulse 2s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.15; }
        }
        .ring-track {
            fill: none;
            stroke: rgba(255, 182, 193, 0.2);
            stroke-width: 3;
        }
        .ring-fill {
            fill: none;
            stroke: #ff69b4;
            stroke-width: 3.5;
            stroke-linecap: round;
            stroke-dasharray: 163.36;
            stroke-dashoffset: 163.36;
            transform-origin: 34px 34px;
            transform: rotate(-90deg);
            transition: stroke-dashoffset 1s linear;
        }
        /* ── Sphere phase ── */
        #transition-overlay {
            position: fixed; inset: 0; background: #000;
            z-index: 500; opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease;
        }
        #sphere-click-hint {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            z-index: 300; padding: 12px 24px;
            background: rgba(0,0,0,0.65); color: #fff; font-size: 1rem;
            border-radius: 24px; pointer-events: none; opacity: 0;
            transition: opacity 0.35s ease;
            font-family: "Pacifico", cursive; letter-spacing: 1px;
        }
        #sphere-click-hint.visible { opacity: 1; }
        #btn-flying-corner {
            position: fixed; bottom: 20px; right: 20px; z-index: 300;
            display: none; padding: 10px 18px; font-size: 20px;
            border: none; border-radius: 24px;
            background: rgba(255, 105, 180, 0.9); color: #fff;
            cursor: pointer; box-shadow: 0 2px 10px rgba(255, 105, 180, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #btn-flying-corner.visible { display: block; }
        #btn-flying-corner:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(255, 105, 180, 0.5); }
        #sphere-particles-bg { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0; transition: opacity 1s; }
        .sp-particle { position: absolute; width: 4px; height: 4px; background: rgba(255,105,180,0.6); border-radius: 50%; animation: spFloat 15s infinite ease-in-out; }
        @keyframes spFloat { 0%,100% { transform: translateY(100vh) rotate(0deg); opacity:0; } 10% { opacity:1; } 80% { opacity:1; } 90%,100% { transform: translateY(-100vh) rotate(720deg); opacity:0; } }
        @keyframes flashFade { 0% { opacity: 1; } 100% { opacity: 0; } }
        /* Cupid letter overlay (kiểu cupid bay) */
        #cupid-letter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            z-index: 350; pointer-events: none;
        }
        #cupid-letter-overlay.visible { display: flex; pointer-events: auto; }
        #cupid-letter-overlay .cupid-space { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        #cupid-flying-img {
            position: absolute; width: clamp(120px, 25vw, 220px); height: auto;
            pointer-events: none; transform: translate(-50%, -50%); z-index: 352;
        }
        #letter-envelope-img {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: clamp(140px, 30vw, 260px); height: auto; cursor: pointer; display: none;
            z-index: 355; transition: transform 0.2s ease;
        }
        #letter-envelope-img.visible { display: block; animation: cupidLetterFadeIn 0.5s ease-out; }
        #letter-envelope-img:hover { transform: translate(-50%, -50%) scale(1.06); }
        #cupid-letter-frame {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: min(92vw, 720px); max-height: 90vh; overflow: visible; display: none;
            flex-direction: column; z-index: 360; border-radius: clamp(12px, 2.5vw, 20px);
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.35), 0 0 0 1px rgba(255, 182, 193, 0.3);
            background: linear-gradient(135deg, #ffd1dc 0%, #ffe4e9 25%, #fff0f5 50%, #ffe4ec 75%, #ffc0cb 100%);
            pointer-events: auto;
        }
        #cupid-letter-frame.visible { display: flex; animation: cupidLetterFadeIn 0.6s ease-out; }
        @media (max-width: 768px) {
            #cupid-letter-frame {
                width: min(92vw, 100%);
                max-width: 92vw;
                max-height: 78vh;
                border-radius: 12px;
            }
            #cupid-letter-frame .letter-content {
                padding: 16px 14px 44px;
                max-height: 72vh;
                font-size: 0.95rem;
                line-height: 1.75;
                -webkit-overflow-scrolling: touch;
            }
        }
        @keyframes cupidLetterFadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes letterShake {
            0%   { transform: translate(-50%, -50%) rotate(0deg); }
            15%  { transform: translate(calc(-50% + 5px), -50%) rotate(0.6deg); }
            30%  { transform: translate(calc(-50% - 4px), -50%) rotate(-0.5deg); }
            45%  { transform: translate(calc(-50% + 3px), -50%) rotate(0.4deg); }
            60%  { transform: translate(calc(-50% - 2px), -50%) rotate(-0.3deg); }
            75%  { transform: translate(calc(-50% + 1px), -50%) rotate(0.15deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }
        #cupid-letter-frame.shaking {
            animation: cupidLetterFadeIn 0.6s ease-out, letterShake 0.55s ease-in-out 0.5s;
        }
        /* Thư: giống index copy — PacificoLocal (nếu có @font-face) + Cormorant Garamond + Georgia, không lỗi font iOS */
        #cupid-letter-frame .letter-content {
            position: relative; z-index: 1;
            padding: clamp(20px, 4vw, 32px) clamp(20px, 4vw, 36px) clamp(60px, 9vw, 90px);
            overflow-y: auto; max-height: 72vh;
            scrollbar-width: none;
            -ms-overflow-style: none;
            font-family: "PacificoLocal", "Cormorant Garamond", Georgia, "Times New Roman", serif !important;
            font-size: clamp(0.95rem, 2vw, 1.2em);
            font-style: normal;
            color: #8b3a62; line-height: 1.75;
            letter-spacing: 0.02em; text-align: center; white-space: pre-wrap;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        #cupid-letter-frame .letter-content::-webkit-scrollbar { display: none; }
        /* Ảnh trong thư — kiểu polaroid lãng mạn, xuất hiện mượt */
        #cupid-letter-frame .letter-image-wrap {
            margin-top: 1.25rem; text-align: center; position: relative; z-index: 1;
            opacity: 0; transform: translateY(12px) scale(0.92);
            transition: none;
        }
        #cupid-letter-frame .letter-image-wrap.visible {
            animation: letterImageReveal 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes letterImageReveal {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        #cupid-letter-frame .letter-inline-image {
            display: block;
            max-width: min(85vw, 320px); width: auto; height: auto; max-height: 38vh;
            margin: 0 auto;
            border-radius: clamp(6px, 1.2vw, 10px);
            box-shadow: 0 4px 20px rgba(139, 58, 98, 0.2);
        }
        #cupid-letter-frame .letter-image-caption {
            display: block;
            margin-top: 0.5em;
            font-size: 1.1em;
            font-family: "PacificoLocal", "Cormorant Garamond", Georgia, serif;
            font-style: normal;
            color: #d84a6f;
            letter-spacing: 0.2em;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.6);
        }
        /* ── Nút điều hướng trang thư ── */
        #letter-page-nav {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 8px 0 4px;
            position: relative; z-index: 2;
        }
        #letter-page-nav.visible { display: flex; }
        .letter-nav-btn {
            background: linear-gradient(135deg, #ff69b4, #d84a6f);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 14px;
            font-family: "PacificoLocal", "Cormorant Garamond", Georgia, serif;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(216, 74, 111, 0.4);
            transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .letter-nav-btn:disabled { opacity: 0.3; cursor: default; transform: none !important; }
        .letter-nav-btn:not(:disabled):active { transform: scale(0.93); }
        #letter-page-indicator {
            font-size: 13px;
            color: #d84a6f;
            font-family: "PacificoLocal", "Cormorant Garamond", Georgia, serif;
            min-width: 52px;
            text-align: center;
            opacity: 0.8;
        }
        /* ── Hiệu ứng flip ảnh ── */
        #cupid-letter-frame .letter-image-wrap {
            perspective: 800px;
        }
        #cupid-letter-frame .letter-inline-image {
            cursor: pointer;
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
        }
        #cupid-letter-frame .letter-inline-image.img-flip-out {
            transform: rotateY(90deg) scale(0.85);
            opacity: 0;
        }
        #cupid-letter-frame .letter-inline-image.img-flip-in {
            transform: rotateY(0deg) scale(1);
            opacity: 1;
        }
        /* ── Tap tip bên dưới ảnh ── */
        .tap-tip {
            margin-top: 8px;
            text-align: center;
            color: #d84a6f;
            font-size: 13px;
            font-family: "PacificoLocal", "Cormorant Garamond", Georgia, serif;
            animation: tapPulse 1.6s ease-in-out infinite;
            opacity: 0.85;
        }
        @keyframes tapPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        /* ── Hiệu ứng kết thúc: tim rơi ── */
        .letter-heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 22px;
            animation: heartFall linear forwards;
        }
        @keyframes heartFall {
            0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            80%  { opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(360deg) scale(0.4); opacity: 0; }
        }
        #cupid-letter-frame .letter-content .letter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #8b3a62;
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        /* ══ NÚT TIM GÓC PHẢI CUỐI THƯ ══ */
        #letter-heart-close {
            position: absolute;
            bottom: clamp(14px, 3vw, 22px);
            right: clamp(14px, 3vw, 22px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        #letter-heart-close-hint {
            font-family: "PacificoLocal", "Cormorant Garamond", Georgia, serif;
            font-size: 11px;
            color: #d84a6f;
            white-space: nowrap;
            animation: hintPulse 1.8s ease-in-out infinite;
            text-shadow: 0 0 8px rgba(216,74,111,0.4);
        }
        @keyframes hintPulse {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            50%       { opacity: 1;   transform: translateY(-2px); }
        }
        #letter-heart-btn {
            width: clamp(52px, 10vw, 68px);
            height: clamp(52px, 10vw, 68px);
            font-size: clamp(28px, 6vw, 40px);
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.85);
            box-shadow: 0 0 0 3px rgba(255,105,180,0.35),
                        0 4px 18px rgba(216,74,111,0.35);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.18s, box-shadow 0.18s;
            animation: heartBtnPop 1.4s ease-in-out infinite;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        @keyframes heartBtnPop {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 3px rgba(255,105,180,0.35), 0 4px 18px rgba(216,74,111,0.35); }
            50%       { transform: scale(1.12); box-shadow: 0 0 0 6px rgba(255,105,180,0.2), 0 6px 24px rgba(216,74,111,0.5); }
        }
        #letter-heart-btn:active { transform: scale(0.9) !important; }

        /* ══ CANVAS PHÁO HOA ══ */
        #fireworks-canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 800;
            display: none;
        }

        /* ══ ẢNH BAY LÊN — kiểu Tết giống project tham khảo ══ */
        .flying-photo-wrapper {
            position: fixed;
            bottom: -140px;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            opacity: 0;
            pointer-events: none;
            z-index: 810; /* Lớp bay nổi hẳn lên trên pháo hoa (800) */
        }
        .flying-photo-wrapper.fw-animate {
            animation: fwPhotoFloatUp var(--fly-dur, 7s) linear forwards;
        }
        @keyframes fwPhotoFloatUp {
            0%   { opacity: 0;   transform: translateX(-50%) translateY(10vh); }
            12%  { opacity: 1; }
            88%  { opacity: 0.9; }
            100% { opacity: 0;   transform: translateX(-50%) translateY(-115vh); }
        }
        .flying-photo {
            display: block;
            width: clamp(70px, 15vw, 130px);
            height: clamp(70px, 15vw, 130px);
            object-fit: cover;
            border-radius: clamp(8px, 1.5vw, 14px);
            border: 3px solid rgba(255, 192, 203, 0.9);
            box-shadow:
                0 0 20px rgba(255, 105, 180, 0.8),
                0 0 40px rgba(255, 20, 147, 0.6),
                0 0 60px rgba(255, 20, 147, 0.3);
            animation: fwImageGlow 2s ease-in-out infinite alternate;
        }
        @keyframes fwImageGlow {
            0%   { box-shadow: 0 0 20px rgba(255,105,180,0.8), 0 0 40px rgba(255,20,147,0.6), 0 0 60px rgba(255,20,147,0.3); border-color: rgba(255,192,203,0.9); }
            100% { box-shadow: 0 0 30px rgba(255,105,180,1), 0 0 60px rgba(255,20,147,0.9), 0 0 90px rgba(255,20,147,0.6); border-color: rgba(255,255,255,1); }
        }
        @media (max-width: 768px) {
            .flying-photo { width: 80px; height: 80px; border-width: 2px; }
        }
        @media (max-width: 480px) {
            .flying-photo { width: 60px; height: 60px; border-width: 2px; border-radius: 8px; }
        }
        /* ── Chữ ký ── */
        .letter-signature {
            position: absolute;
            right: clamp(16px, 4vw, 32px);
            bottom: clamp(12px, 3vw, 24px);
            font-family: "PacificoLocal", "Cormorant Garamond", Georgia, serif;
            font-size: 0.9em;
            opacity: 0.9;
        }
        #cupid-letter-frame .letter-content.typing-complete {
            -webkit-overflow-scrolling: touch;
        }
        /* Bướm trái: đậu ở góc trên-trái của lá thư (ngoài viền) */
        #cupid-letter-frame .letter-butterfly-left {
            position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none;
            transform: translate(-55%, -50%) rotate(-10deg);
        }
        #cupid-letter-frame .letter-butterfly-left img {
            width: clamp(200px, 32vw, 340px); height: auto; object-fit: contain;
            filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.2));
        }
        /* Bướm phải: đậu ở góc trên-phải của lá thư (ngoài viền) */
        #cupid-letter-frame .letter-butterfly-right {
            position: absolute; top: 0; right: 0; z-index: 2; pointer-events: none;
            transform: translate(52%, -48%) rotate(10deg);
        }
        #cupid-letter-frame .letter-butterfly-right img {
            width: clamp(110px, 24vw, 200px); height: auto; object-fit: contain;
            filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.2));
        }
        #cupid-letter-frame .letter-bottom-bg {
            position: absolute; bottom: 0; left: 0; right: 0; height: 42%;
            z-index: 0; pointer-events: none;
            border-bottom-left-radius: clamp(12px, 2.5vw, 20px);
            border-bottom-right-radius: clamp(12px, 2.5vw, 20px);
            background: url('assets/nenthugocduoi.png') no-repeat bottom center;
            background-size: 100% auto;
        }
        #loading {
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            z-index: 1000; 
            transition: opacity 0.6s ease-out; 
        }
        #loading span {
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 15px; 
        }
        #progress-container {
             width: 60%;
             max-width: 300px;
             height: 6px;
             background-color: rgba(255, 255, 255, 0.1);
             border-radius: 3px;
             overflow: hidden; 
        }
        #progress {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, #ff69b4, #ffb6c1); 
            transition: width 0.3s ease; 
            border-radius: 3px;
        }

        /* ========== PASSCODE SCREEN ========== */
        #passcodeScreen {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(70, 20, 50, 0.82), rgba(45, 10, 35, 0.88)),
                        linear-gradient(160deg, #2d0f2a 0%, #1a0a18 100%);
            z-index: 2000; display: none; flex-direction: column; align-items: center;
            padding: 30px 20px 30px; overflow: hidden;
            touch-action: manipulation; -webkit-user-select: none; user-select: none;
            font-family: -apple-system, sans-serif;
        }
        #passcodeScreen.visible { display: flex; }
        #passcodeScreen.hiding { opacity: 0; pointer-events: none; transition: opacity 0.5s ease-out; }

        .passcode-bears { position: relative; width: 100%; max-width: 420px; height: 200px; flex-shrink: 0; }
        .passcode-bear {
            position: absolute; top: 50%; transform: translateY(-50%);
            height: clamp(160px, 35vw, 220px); width: auto; object-fit: contain;
            transition: left 0.4s ease, right 0.4s ease;
        }
        .passcode-bear.left  { left: 5%; }
        .passcode-bear.right { right: 5%; left: auto; }
        .passcode-bear.left.pos-0  { left: 5%; }   .passcode-bear.right.pos-0 { right: 5%; }
        .passcode-bear.left.pos-1  { left: 10%; }  .passcode-bear.right.pos-1 { right: 10%; }
        .passcode-bear.left.pos-2  { left: 18%; }  .passcode-bear.right.pos-2 { right: 18%; }
        .passcode-bear.left.pos-3  { left: 27%; }  .passcode-bear.right.pos-3 { right: 27%; }

        function generateFromImage(img, count, size) {
            let w = img.naturalWidth || img.width;
            let h = img.naturalHeight || img.height;
            const maxDim = 2600;
            if (w > maxDim || h > maxDim) {
                const s = maxDim / Math.max(w, h);
                w = Math.round(w * s);
                h = Math.round(h * s);
            }
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(img, 0, 0, w, h);
            const data = ctx.getImageData(0, 0, w, h).data;
            const list = [];
            const brightnessThreshold = 1;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    const r = data[idx], g = data[idx + 1], b = data[idx + 2], a = data[idx + 3];
                    const brightness = (r + g + b) / 3;
                    if (a > 10 && brightness > brightnessThreshold) {
                        list.push({ x, y, brightness, r, g, b, key: y * w + x });
                    }
                }
            }
            if (list.length === 0) return null;
            list.sort((a, b) => a.key - b.key);
            const actualCount = Math.min(count, list.length);
            const scale = size / Math.max(w, h);
            const cx = w / 2, cy = h / 2;
            const depthScale = size * 0.06;
            const points = new Float32Array(actualCount * 3);
            const colors = new Float32Array(actualCount * 3);
            for (let i = 0; i < actualCount; i++) {
                const idx = list.length <= actualCount ? i : Math.floor((i * list.length) / actualCount);
                const p = list[Math.min(idx, list.length - 1)];
                const px = (p.x - cx) * scale;
                const py = (cy - p.y) * scale;
                const pz = (p.brightness / 255) * depthScale;
                points[i * 3] = px;
                points[i * 3 + 1] = py;
                points[i * 3 + 2] = pz;
                let r = p.r / 255, g = p.g / 255, b = p.b / 255;
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                r = gray + (r - gray) * 1.12;
                g = gray + (g - gray) * 1.12;
                b = gray + (b - gray) * 1.12;
                const lum = 0.299 * r + 0.587 * g + 0.114 * b;
                if (lum > 0.5) {
                    const t = (lum - 0.5) / 0.5;
                    const darken = 1 - t * 0.4;
                    r *= darken; g *= darken; b *= darken;
                } else if (lum < 0.2) {
                    const lift = 1.25;
                    r = Math.min(1, r * lift); g = Math.min(1, g * lift); b = Math.min(1, b * lift);
                }
                colors[i * 3] = Math.max(0, Math.min(1, r));
                colors[i * 3 + 1] = Math.max(0, Math.min(1, g));
                colors[i * 3 + 2] = Math.max(0, Math.min(1, b));
            }
            return { positions: points, colors };
        }

        function generateFromText(text, count, size) {

            const ctx = document.createElement('canvas').getContext('2d');
            ctx.font = `bold ${fontSize}px "Pacifico", cursive`;
            const words = text.trim().split(/\s+/);
            const lines = [];
            let line = '';
            for (const word of words) {
                const next = line ? line + ' ' + word : word;
                if (ctx.measureText(next).width <= maxLineWidth) {
                    line = next;
                } else {
                    if (line) lines.push(line);
                    line = ctx.measureText(word).width <= maxLineWidth ? word : word;
                }
            }
            if (line) lines.push(line);
            const h = Math.max(280, lines.length * lineHeight + 60);
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx2 = canvas.getContext('2d');
            ctx2.fillStyle = '#000';
            ctx2.fillRect(0, 0, w, h);
            ctx2.fillStyle = '#fff';
            ctx2.font = `bold ${fontSize}px "Pacifico", cursive`;
            ctx2.textAlign = 'center';
            ctx2.textBaseline = 'middle';
            const startY = h / 2 - (lines.length - 1) * (lineHeight / 2);
            lines.forEach((ln, i) => {
                ctx2.fillText(ln, w / 2, startY + i * lineHeight);
            });
            const data = ctx2.getImageData(0, 0, w, h).data;
            const list = [];
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
                    if (brightness > 20) list.push({ x, y, brightness, key: y * w + x });
                }
            }
            if (list.length === 0) return null;
            list.sort((a, b) => a.key - b.key);
            const scale = size / Math.max(w, h);
            const cx = w / 2, cy = h / 2;
            const depthScale = size * 0.05;
            const points = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const maxRadius = size * 0.6;
            for (let i = 0; i < count; i++) {
                const idx = Math.min(Math.floor((i * list.length) / count), list.length - 1);
                const p = list[idx];
                const px = (p.x - cx) * scale;
                const py = (cy - p.y) * scale;
                const pz = (p.brightness / 255) * depthScale;
                points[i * 3] = px;
                points[i * 3 + 1] = py;
                points[i * 3 + 2] = pz;
                const dist = Math.sqrt(px * px + py * py + pz * pz);
                const hue = THREE.MathUtils.mapLinear(dist, 0, maxRadius, 330, 360);
                const c = new THREE.Color().setHSL(hue / 360, 0.82, 0.45);
                colors[i * 3] = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;
            }
            return { positions: points, colors };
        }

        let particleCount = 0;
        let isMorphing = false;
        let morphStartTime = 0;

        function rebuildParticleSystemForImage(result) {
            const count = result.positions.length / 3;
            particleCount = count;
            if (particleSystem) {
                scene.remove(particleSystem);
                particlesGeometry.dispose();
                particlesMaterial.dispose();
            }

            currentPositions = new Float32Array(result.positions);
            sourcePositions = new Float32Array(result.positions);
            targetPositions = [new Float32Array(result.positions)];

            particlesGeometry = new THREE.BufferGeometry();
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));

            const [minS, maxS] = CONFIG.imageParticleSizeRange;
            particleSizes = new Float32Array(count);
            particleOpacities = new Float32Array(count);
            particleEffectStrengths = new Float32Array(count);
            for (let i = 0; i < count; i++) {
                particleSizes[i] = THREE.MathUtils.randFloat(minS, maxS);
                particleOpacities[i] = 1.0;
                particleEffectStrengths[i] = 0.0;
            }
            particlesGeometry.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
            particlesGeometry.setAttribute('opacity', new THREE.BufferAttribute(particleOpacities, 1));
            particlesGeometry.setAttribute('aEffectStrength', new THREE.BufferAttribute(particleEffectStrengths, 1));
            particlesGeometry.setAttribute('color', new THREE.BufferAttribute(result.colors, 3));

            particlesMaterial = new THREE.ShaderMaterial({
                 uniforms: { pointTexture: { value: createSharpParticleTexture() } },
                 vertexShader: `
                      attribute float size; attribute float opacity; attribute float aEffectStrength;
                      varying vec3 vColor; varying float vOpacity; varying float vEffectStrength;
                      void main() {
                           vColor = color; vOpacity = opacity; vEffectStrength = aEffectStrength;
                           vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                           float sizeScale = 1.0 - vEffectStrength * 0.5;
                           gl_PointSize = size * sizeScale * (650.0 / -mvPosition.z);
                           gl_Position = projectionMatrix * mvPosition;
                      }`,
                 fragmentShader: `
                      uniform sampler2D pointTexture;
                      varying vec3 vColor; varying float vOpacity; varying float vEffectStrength;
                      void main() {
                           float alpha = texture2D(pointTexture, gl_PointCoord).a;
                           if (alpha < 0.05) discard;
                           gl_FragColor = vec4(vColor, alpha * vOpacity);
                      }`,
                 blending: THREE.NormalBlending, depthTest: true, depthWrite: false, transparent: true, vertexColors: true
            });

            particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particleSystem);
        }

        function startMorphToResult(result) {
            const count = result.positions.length / 3;
            const positions = particlesGeometry.attributes.position.array;
            sourcePositions = new Float32Array(positions);
            targetPositions = [new Float32Array(result.positions)];
            particlesGeometry.attributes.color.array.set(result.colors);
            particlesGeometry.attributes.color.needsUpdate = true;
            isMorphing = true;
            morphStartTime = clock.getElapsedTime();
        }

        function applyImageToParticles(result) {
            if (!scene || !result) return;
            const { colors: imageColors } = result;
            if (!imageColors) return;
            bloomPass.strength = 0.22;
            bloomPass.threshold = 0.35;
            const count = result.positions.length / 3;
            if (particleSystem && particleCount === count) {
                startMorphToResult(result);
                return;
            }
            rebuildParticleSystemForImage(result);
        }

        async function applyTextToParticles(text) {
            if (!scene) return;
            await document.fonts.load('140px "Pacifico"');
            const chars = text.trim().length;
            const textParticleCount = Math.min(CONFIG.textParticleCountMax,
                Math.max(CONFIG.textParticleCountMin, chars * CONFIG.textParticlesPerChar));
            const result = generateFromText(text, textParticleCount, CONFIG.shapeSize);
            if (!result) return;
            bloomPass.strength = 0.28;
            bloomPass.threshold = 0.42;
            const count = result.positions.length / 3;
            if (particleSystem && particleCount === count) {
                startMorphToResult(result);
                return;
            }
            rebuildParticleSystemForImage(result);
        }

        function init() {
            let progress = 0;
            const progressBar = document.getElementById('progress');
            const loadingScreen = document.getElementById('loading');
            function updateProgress(increment) {
                progress += increment;
                progressBar.style.width = `${Math.min(100, progress)}%`;
                if (progress >= 100) {
                    setTimeout(() => {
                        loadingScreen.style.opacity = '0';
                        setTimeout(() => { loadingScreen.style.display = 'none'; }, 600);
                    }, 200);
                }
            }

            clock = new THREE.Clock();
            noise3D = createNoise3D(() => Math.random());
            noise4D = createNoise4D(() => Math.random());
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.03);
            updateProgress(5);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            if (isDesktop) {
                camera.position.set(0, 6, 18);
            } else {
                camera.position.set(0, 8, 26);
            } 
            camera.lookAt(scene.position);
            updateProgress(5);

            const canvas = document.getElementById('webglCanvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true, powerPreference: 'high-performance' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            updateProgress(10);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            controls.minDistance = 5; controls.maxDistance = 80;
            controls.autoRotate = false;
            updateProgress(5);

            scene.add(new THREE.AmbientLight(0x554050));
            const dirLight1 = new THREE.DirectionalLight(0xfff0f5, 1.4);
            dirLight1.position.set(15, 20, 10); scene.add(dirLight1);
            const dirLight2 = new THREE.DirectionalLight(0xffb6c1, 0.9);
            dirLight2.position.set(-15, -10, -15); scene.add(dirLight2);
            updateProgress(10);

            setupPostProcessing(); updateProgress(10);
            updateProgress(25);

            window.addEventListener('resize', onWindowResize);
            updateProgress(40);

            isInitialized = true;
            animate();

            if (enableMorphEffect) {
                prepareAndWait();           
            } else if (enableSphere) {
                startSpherePhase();         
            } else if (enableLetter) {
                startCupidLetterSequence();
            }
        }

        function setupPostProcessing() {
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), CONFIG.bloomStrength, CONFIG.bloomRadius, CONFIG.bloomThreshold);
            composer.addPass(bloomPass);
        }

        function createSharpParticleTexture() {
            const size = 128; const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size; const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.4, 'rgba(255,255,255,0.98)');
            gradient.addColorStop(0.7, 'rgba(255,255,255,0.6)');
            gradient.addColorStop(0.92, 'rgba(255,255,255,0.15)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient; context.fillRect(0, 0, size, size);
            return new THREE.CanvasTexture(canvas);
        }

        // ── AutoPlay sequence ──────────────────────────────────────────────
        const AUTOPLAY_TEXT_COUNT = 80000;
        const BACKGROUND_SCATTER_COUNT = 5000;
        const SEQUENCE_HOLD_MS = 1000;
        const MORPH_WAIT_MS = 2200;
        const MORPH_OVERLAY_FADE_MS = 1200;
        const MORPH_OVERLAY_HOLD_MS = 3800;

        let _preloadedImg = null;
        let morphImageOverlay = null;
        let morphOverlayFadeStartTime = null;

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function createMorphImageOverlay(img) {
            const w = img.naturalWidth || img.width;
            const h = img.naturalHeight || img.height;
            const size = CONFIG.textShapeSize;
            const aspect = w / h;
            const planeW = aspect >= 1 ? size : size * aspect;
            const planeH = aspect >= 1 ? size / aspect : size;

            const srcW = img.naturalWidth  || img.width;
            const srcH = img.naturalHeight || img.height;
            const offscreen = document.createElement('canvas');
            offscreen.width  = srcW;
            offscreen.height = srcH;
            const octx = offscreen.getContext('2d');
            octx.imageSmoothingEnabled = true;
            octx.imageSmoothingQuality = 'high';
            octx.drawImage(img, 0, 0, srcW, srcH);

            const geometry = new THREE.PlaneGeometry(planeW, planeH, 1, 1);
            const texture  = new THREE.CanvasTexture(offscreen);
            texture.generateMipmaps = false;          
            texture.minFilter       = THREE.LinearFilter;
            texture.magFilter       = THREE.LinearFilter;
            texture.anisotropy      = renderer.capabilities.getMaxAnisotropy();
            texture.colorSpace      = THREE.SRGBColorSpace; 
            texture.needsUpdate     = true;
            const material = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 0,
                depthTest: false,
                depthWrite: false,
                toneMapped: false,
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(0, 0, 0);
            mesh.lookAt(camera.position);  
            mesh.renderOrder = 10;
            mesh.layers.set(1);
            scene.add(mesh);
            return mesh;
        }

        function removeMorphImageOverlay() {
            morphOverlayFadeStartTime = null;
            if (!morphImageOverlay) return;
            scene.remove(morphImageOverlay);
            if (morphImageOverlay.geometry) morphImageOverlay.geometry.dispose();
            if (morphImageOverlay.material) {
                if (morphImageOverlay.material.map) morphImageOverlay.material.map.dispose();
                morphImageOverlay.material.dispose();
            }
            morphImageOverlay = null;
        }

        function createBackgroundScatterLayer() {
            const count = BACKGROUND_SCATTER_COUNT;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const [minS, maxS] = CONFIG.imageParticleSizeRange;
            const sizes = new Float32Array(count);
            const opacities = new Float32Array(count);
            const effectStrengths = new Float32Array(count);
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 3 + Math.random() * 14;
                positions[i3]     = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = r * Math.cos(phi);
                const hue = 330 + Math.random() * 30;
                const c = new THREE.Color().setHSL(hue / 360, 0.8, 0.4 + Math.random() * 0.2);
                colors[i3] = c.r; colors[i3 + 1] = c.g; colors[i3 + 2] = c.b;
                sizes[i] = THREE.MathUtils.randFloat(minS * 0.8, maxS * 0.8);
                opacities[i] = 0.85;
                effectStrengths[i] = 0;
            }
            backgroundSourcePositions = new Float32Array(positions);
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geo.setAttribute('opacity', new THREE.BufferAttribute(opacities, 1));
            geo.setAttribute('aEffectStrength', new THREE.BufferAttribute(effectStrengths, 1));
            const mat = new THREE.ShaderMaterial({
                uniforms: { pointTexture: { value: createSharpParticleTexture() } },
                vertexShader: `
                    attribute float size; attribute float opacity; attribute float aEffectStrength;
                    varying vec3 vColor; varying float vOpacity; varying float vEffectStrength;
                    void main() {
                        vColor = color; vOpacity = opacity; vEffectStrength = aEffectStrength;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        float sizeScale = 1.0 - vEffectStrength * 0.5;
                        gl_PointSize = size * sizeScale * (650.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }`,
                fragmentShader: `
                    uniform sampler2D pointTexture;
                    varying vec3 vColor; varying float vOpacity; varying float vEffectStrength;
                    void main() {
                        float alpha = texture2D(pointTexture, gl_PointCoord).a;
                        if (alpha < 0.05) discard;
                        gl_FragColor = vec4(vColor, alpha * vOpacity);
                    }`,
                blending: THREE.NormalBlending, depthTest: true, depthWrite: false, transparent: true, vertexColors: true
            });
            backgroundParticlesGeometry = geo;
            backgroundParticlesMaterial = mat;
            backgroundParticleSystem = new THREE.Points(geo, mat);
            backgroundParticleSystem.renderOrder = -1;
            scene.add(backgroundParticleSystem);
        }

        function initScatterParticles() {
            const count = AUTOPLAY_TEXT_COUNT;
            const positions = new Float32Array(count * 3);
            const colors    = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.acos(2 * Math.random() - 1);
                const r     = 3 + Math.random() * 14;
                positions[i3]     = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = r * Math.cos(phi);
                const hue = 330 + Math.random() * 30;
                const c = new THREE.Color().setHSL(hue / 360, 0.8, 0.45 + Math.random() * 0.2);
                colors[i3] = c.r; colors[i3 + 1] = c.g; colors[i3 + 2] = c.b;
            }
            createBackgroundScatterLayer();
            bloomPass.strength = 0.5;
            bloomPass.threshold = 0.1;
            rebuildParticleSystemForImage({ positions, colors });
        }

        function showText(text) {
            const result = generateFromText(text, AUTOPLAY_TEXT_COUNT, CONFIG.textShapeSize);
            if (!result) return;
            bloomPass.strength = 0.28;
            bloomPass.threshold = 0.42;
            const count = result.positions.length / 3;
            if (particleSystem && particleCount === count) {
                startMorphToResult(result);
            } else {
                rebuildParticleSystemForImage(result);
            }
        }

        async function prepareAndWait() {
            await document.fonts.load('140px "Pacifico"');
            const imgSrc = (cfg.particleImage && String(cfg.particleImage).trim()) ? cfg.particleImage : null;
            if (imgSrc) {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = imgSrc;
                await new Promise(r => { img.onload = r; img.onerror = r; });
                _preloadedImg = img;
            } else {
                _preloadedImg = null;
            }

            initScatterParticles();
            isScatterPhase = true;

            const wrap    = document.getElementById('start-wrap');
            const ringFill = document.getElementById('ring-fill');
            const startLabel = document.getElementById('start-label');
            wrap.style.display = 'flex';

            var isAndroid = /Android/i.test(navigator.userAgent || '');
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent || '') || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            var holdTimer = null;
            var holdStartTime = 0;
            var HOLD_MS = 1000;
            var triggered = false;
            var androidTapCount = 0;
  
            if (startLabel) startLabel.textContent = isAndroid ? 'Chạm 2 lần để bắt đầu' : 'Giữ để bắt đầu';

            function onDown(e) {
                e.preventDefault();
                if (triggered) return;
                if (isAndroid) {
                    androidTapCount++;
                    if (androidTapCount === 1) {
                        if (startLabel) startLabel.textContent = 'Chạm 2 lần để bắt đầu';
                        return;
                    }
                    if (typeof startBgMusic === 'function') {
                        try { startBgMusic(); } catch (_) {}
                    }
                    triggered = true;
                    wrap.style.display = 'none';
                    startAutoPlay();
                    return;
                }
                holdStartTime = Date.now();
                if (typeof startBgMusic === 'function') {
                    try { startBgMusic(); } catch (_) {}
                }
                ringFill.style.transition = 'stroke-dashoffset 1s linear';
                ringFill.style.strokeDashoffset = '163.36';
                void ringFill.offsetHeight;
                ringFill.style.strokeDashoffset = '0';
                holdTimer = setInterval(function() {
                    var elapsed = Date.now() - holdStartTime;
                    if (elapsed >= 500) wrap.classList.add('held');
                    if (elapsed >= HOLD_MS) {
                        clearInterval(holdTimer);
                        holdTimer = null;
                        triggered = true;
                        wrap.style.display = 'none';
                        startAutoPlay();
                    }
                }, 100);
            }
            function onUp(e) {
                if (isAndroid) return;
                var wasHolding = !!holdTimer;
                if (holdTimer) {
                    clearInterval(holdTimer);
                    holdTimer = null;
                }
                if (triggered) return;
                wrap.classList.remove('held');
                if (wasHolding) {
                    if (typeof stopBgMusic === 'function') {
                        try { stopBgMusic(); } catch (_) {}
                    }
                    ringFill.style.transition = 'stroke-dashoffset 0.3s ease';
                    ringFill.style.strokeDashoffset = '163.36';
                }
            }

            wrap.onpointerdown = onDown;
            wrap.onpointerup = onUp;
            wrap.onpointercancel = onUp;
            wrap.onpointerleave = onUp;
        }

        async function startAutoPlay() {
            isScatterPhase = false;
            const morphTexts = (cfg.morphTexts && cfg.morphTexts.length) ? cfg.morphTexts : ['happy', "women's day", 'em iu'];
            for (const text of morphTexts) {
                showText(text);
                await sleep(MORPH_WAIT_MS + SEQUENCE_HOLD_MS);
            }

            if (_preloadedImg) {
                const imgLow = generateFromImage(_preloadedImg, AUTOPLAY_TEXT_COUNT, CONFIG.textShapeSize);
                if (imgLow) {
                    bloomPass.strength = 0.22;
                    bloomPass.threshold = 0.35;
                    const count = imgLow.positions.length / 3;
                    if (particleSystem && particleCount === count) {
                        startMorphToResult(imgLow);
                    } else {
                        rebuildParticleSystemForImage(imgLow);
                    }
                }
                await sleep(MORPH_WAIT_MS + 500);

                isMorphing = false;
                morphImageOverlay = createMorphImageOverlay(_preloadedImg);
                morphOverlayFadeStartTime = clock.getElapsedTime();
                await sleep(MORPH_OVERLAY_FADE_MS + MORPH_OVERLAY_HOLD_MS);
            } else {
                await sleep(600);
            }

            triggerExplosion();
            if (enableSphere) {
                startSpherePhase();
            } else if (enableLetter) {
                await sleep(3500);
                startCupidLetterSequence();
            }
        }

        let isScatterPhase = false; 

        // ── Explosion ──────────────────────────────────────────────────────
        let isExploding = false;
        let explodeStartTime = 0;
        let explodeVelocities = null;
        let explodeStartPositions = null;

        function triggerExplosion() {
            if (!particleSystem || particleCount === 0) return;
            isMorphing = false;
            removeMorphImageOverlay();
            isExploding = true;
            explodeStartTime = clock.getElapsedTime();
            explodeVelocities = new Float32Array(particleCount * 3);
            explodeStartPositions = new Float32Array(sourcePositions);
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const dir = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.2) * 2
                ).normalize();
                const speed = 4 + Math.random() * 14;
                explodeVelocities[i3]     = dir.x * speed;
                explodeVelocities[i3 + 1] = dir.y * speed;
                explodeVelocities[i3 + 2] = dir.z * speed;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isInitialized) return;
            const elapsedTime = clock.getElapsedTime();
            const deltaTime = clock.getDelta();
            controls.update();
            if (particlesGeometry && particleCount > 0) {
                const positions = particlesGeometry.attributes.position.array;
                const effectStrengths = particlesGeometry.attributes.aEffectStrength.array;
                updateIdleAnimation(positions, effectStrengths, elapsedTime, deltaTime);
                particlesGeometry.attributes.position.needsUpdate = true;
            }
            if (backgroundParticlesGeometry && backgroundSourcePositions) {
                const pos = backgroundParticlesGeometry.attributes.position.array;
                for (let i = 0; i < BACKGROUND_SCATTER_COUNT; i++) {
                    const i3 = i * 3;
                    sourceVec.fromArray(backgroundSourcePositions, i3);
                    const drift = 0.2;
                    pos[i3]     = sourceVec.x + noise3D(sourceVec.x * 0.4, sourceVec.y * 0.4, elapsedTime * 0.18) * drift;
                    pos[i3 + 1] = sourceVec.y + noise3D(sourceVec.y * 0.4, sourceVec.z * 0.4, elapsedTime * 0.18) * drift;
                    pos[i3 + 2] = sourceVec.z + noise3D(sourceVec.z * 0.4, sourceVec.x * 0.4, elapsedTime * 0.18) * drift;
                }
                backgroundParticlesGeometry.attributes.position.needsUpdate = true;
            }
            if (morphImageOverlay && morphOverlayFadeStartTime != null && morphImageOverlay.material) {
                const t = (elapsedTime - morphOverlayFadeStartTime) / (MORPH_OVERLAY_FADE_MS / 1000);
                if (t >= 1) {
                    morphImageOverlay.material.opacity = 1;
                    morphOverlayFadeStartTime = null;
                } else {
                    morphImageOverlay.material.opacity = t * t * (3 - 2 * t);
                }
            }
            if (spPhase) updateSpherePhase();
            if (cupidLetterState === 'flying') updateCupidFly();

            if (spPhase) {
                renderer.render(scene, camera);
            } else if (morphImageOverlay) {
                camera.layers.disable(1);
                composer.render(deltaTime);
                camera.layers.enable(1);
                camera.layers.disable(0);
                renderer.autoClear = false;
                renderer.render(scene, camera);
                renderer.autoClear = true;
                camera.layers.enable(0);
            } else {
                composer.render(deltaTime);
            }
        }

        function updateIdleAnimation(positions, effectStrengths, elapsedTime, deltaTime) {
            if (isExploding && explodeVelocities && explodeStartPositions) {
                const t = elapsedTime - explodeStartTime;
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    positions[i3]     = explodeStartPositions[i3]     + explodeVelocities[i3]     * t;
                    positions[i3 + 1] = explodeStartPositions[i3 + 1] + explodeVelocities[i3 + 1] * t;
                    positions[i3 + 2] = explodeStartPositions[i3 + 2] + explodeVelocities[i3 + 2] * t;
                }
                return;
            }
            if (isMorphing && targetPositions && targetPositions[0]) {
                const t = Math.min(1, (elapsedTime - morphStartTime) / CONFIG.morphDuration);
                const smoothT = t * t * (3 - 2 * t);
                const target = targetPositions[0];
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    positions[i3] = sourcePositions[i3] + (target[i3] - sourcePositions[i3]) * smoothT;
                    positions[i3 + 1] = sourcePositions[i3 + 1] + (target[i3 + 1] - sourcePositions[i3 + 1]) * smoothT;
                    positions[i3 + 2] = sourcePositions[i3 + 2] + (target[i3 + 2] - sourcePositions[i3 + 2]) * smoothT;
                }
                if (t >= 1) {
                    isMorphing = false;
                    sourcePositions = new Float32Array(target);
                }
                return;
            }

            const driftAmt = isScatterPhase ? 0.25 : 0;
            let needsEffectStrengthReset = false;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                sourceVec.fromArray(sourcePositions, i3);
                if (driftAmt > 0) {
                    positions[i3]     = sourceVec.x + noise3D(sourceVec.x * 0.4, sourceVec.y * 0.4, elapsedTime * 0.18) * driftAmt;
                    positions[i3 + 1] = sourceVec.y + noise3D(sourceVec.y * 0.4, sourceVec.z * 0.4, elapsedTime * 0.18) * driftAmt;
                    positions[i3 + 2] = sourceVec.z + noise3D(sourceVec.z * 0.4, sourceVec.x * 0.4, elapsedTime * 0.18) * driftAmt;
                } else {
                    positions[i3] = sourceVec.x;
                    positions[i3 + 1] = sourceVec.y;
                    positions[i3 + 2] = sourceVec.z;
                }
                if (effectStrengths[i] !== 0.0) {
                    effectStrengths[i] = 0.0;
                    needsEffectStrengthReset = true;
                }
            }
            if (needsEffectStrengthReset) {
                particlesGeometry.attributes.aEffectStrength.needsUpdate = true;
            }
        }

        function spRandOnSphere(r) {
            const t = Math.random() * Math.PI * 2, p = Math.acos(2 * Math.random() - 1);
            return new THREE.Vector3(r * Math.sin(p) * Math.cos(t), r * Math.cos(p), r * Math.sin(p) * Math.sin(t));
        }

        function spCreatePatch(r, t0, t1, p0, p1, ws, hs) {
            const geo = new THREE.BufferGeometry();
            const verts = [], uvs = [], idx = [];
            for (let y = 0; y <= hs; y++) {
                const v = y / hs, phi = p0 + v * (p1 - p0);
                for (let x = 0; x <= ws; x++) {
                    const u = x / ws, theta = t0 + u * (t1 - t0);
                    verts.push(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
                    uvs.push(u, 1 - v);
                }
            }
            for (let y = 0; y < hs; y++) for (let x = 0; x < ws; x++) {
                const a = y * (ws + 1) + x, b = a + 1, c = a + (ws + 1), d = c + 1;
                idx.push(a, c, b, b, c, d);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(idx);
            geo.computeVertexNormals();
            return geo;
        }

        function spBuildSphere() {
            let imgIdx = 0, midIdx = 0;
            const midRows = [2, 3];
            spPhiStart = Math.PI * SP_POLAR_MARGIN;
            spPhiEnd   = Math.PI * (1 - SP_POLAR_MARGIN);
            spPhiRange = spPhiEnd - spPhiStart;
            const len = spTextures.length;
            for (let row = 0; row < SP_ROWS; row++) {
                const p1 = spPhiStart + (row / SP_ROWS) * spPhiRange;
                const p2 = spPhiStart + ((row + 1) / SP_ROWS) * spPhiRange;
                const pMid = (p1 + p2) / 2;
                const circ = 2 * Math.PI * SP_RADIUS * Math.sin(pMid);
                const imgH = spPhiRange * SP_RADIUS / SP_ROWS;
                const n = Math.max(3, Math.round(circ / imgH));
                const tStep = (2 * Math.PI) / n;
                for (let col = 0; col < n; col++) {
                    const t = col * tStep;
                    let tex;
                    if (midRows.includes(row)) { tex = spTextures[midIdx % len]; midIdx++; }
                    else { tex = spTextures[imgIdx % len]; imgIdx++; }
                    const geo = spCreatePatch(SP_RADIUS, t, t + tStep, p1, p2, 12, 12);
                    const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true, opacity: 1 });
                    const mesh = new THREE.Mesh(geo, mat);
                    const startPos = spRandOnSphere(SP_INTRO_RADIUS);
                    mesh.userData.introStartPos = startPos;
                    mesh.userData.introDelay = Math.random() * SP_INTRO_STAGGER_MS;
                    mesh.position.copy(startPos);
                    spGroup.add(mesh);
                    spMeshes.push(mesh);
                }
            }
            spIntroStartTime = Date.now();
        }

        function spGlowTexture(size) {
            const c = document.createElement('canvas'); c.width = c.height = size;
            const ctx = c.getContext('2d'), cx = size / 2;
            const g = ctx.createRadialGradient(cx, cx, 0, cx, cx, cx);
            g.addColorStop(0, 'rgba(255,105,180,1)'); g.addColorStop(0.2, 'rgba(255,182,193,0.85)');
            g.addColorStop(0.45, 'rgba(255,105,180,0.5)'); g.addColorStop(0.7, 'rgba(255,105,180,0.2)');
            g.addColorStop(1, 'rgba(255,105,180,0)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
            return new THREE.CanvasTexture(c);
        }

        function spRoundedRectGeo(w, h, radius) {
            const shape = new THREE.Shape();
            const x = -w/2, y = -h/2;
            shape.moveTo(x + radius, y); shape.lineTo(x + w - radius, y);
            shape.quadraticCurveTo(x + w, y, x + w, y + radius);
            shape.lineTo(x + w, y + h - radius);
            shape.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            shape.lineTo(x + radius, y + h);
            shape.quadraticCurveTo(x, y + h, x, y + h - radius);
            shape.lineTo(x, y + radius); shape.quadraticCurveTo(x, y, x + radius, y);
            const geo = new THREE.ShapeGeometry(shape);
            const pos = geo.attributes.position, uvsArr = [];
            for (let i = 0; i < pos.count; i++) uvsArr.push((pos.getX(i) + w/2) / w, (pos.getY(i) + h/2) / h);
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvsArr, 2));
            return geo;
        }

        function spCreateFloatingImages() {
            spFloatingGroup = new THREE.Group(); scene.add(spFloatingGroup);
            const total = 40, grid = 16, used = [];
            const glowTex = spGlowTexture(128);
            function validPos(x, y, z, d) { return used.every(p => Math.hypot(x-p.x, y-p.y, z-p.z) >= d); }
            function findPos(size) {
                const d = size * 1.5 + 1;
                for (let i = 0; i < 100; i++) {
                    const x = (Math.random()-.5)*grid, y = (Math.random()-.5)*grid, z = (Math.random()-.5)*grid;
                    if (validPos(x,y,z,d)) { used.push({x,y,z}); return {x,y,z}; }
                }
                const a = Math.random()*Math.PI*2, dist = grid/2 + Math.random()*2;
                return { x: Math.cos(a)*dist, y: (Math.random()-.5)*grid, z: Math.sin(a)*dist };
            }
            for (let i = 0; i < total; i++) {
                const ti = i % spTextures.length;
                const tex = spTextures[ti];
                const imgUrl = (spSphereImageUrls[ti] || '').toString();
                const isDefaultImage = imgUrl.indexOf('imagedefault') !== -1;
                const sv = 0.5 + Math.random() * 2, w = 1.5*sv, h = 1*sv, cr = 0.15*sv;
                const ig = new THREE.Group();
                let goMat = null, gMat = null;
                if (!isDefaultImage) {
                    goMat = new THREE.MeshBasicMaterial({ map: glowTex, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false });
                    ig.add(new THREE.Mesh(spRoundedRectGeo(w*2.2, h*2.2, cr*2.2), goMat));
                    gMat = new THREE.MeshBasicMaterial({ map: glowTex, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false });
                    ig.add(new THREE.Mesh(spRoundedRectGeo(w*1.5, h*1.5, cr*1.5), gMat));
                }
                const iMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true, opacity: 0 });
                ig.add(new THREE.Mesh(spRoundedRectGeo(w, h, cr), iMat));
                const tPhi = Math.acos(2*Math.random()-1), tTheta = Math.random()*Math.PI*2;
                ig.position.set(SP_RADIUS*.5*Math.sin(tPhi)*Math.cos(tTheta), SP_RADIUS*.5*Math.cos(tPhi), SP_RADIUS*.5*Math.sin(tPhi)*Math.sin(tTheta));
                const tp = findPos(Math.max(w,h));
                ig.userData = { startPos: ig.position.clone(), targetPos: new THREE.Vector3(tp.x,tp.y,tp.z),
                    floatSpeedY: 0.3+Math.random()*0.5, floatAmplY: 0.1+Math.random()*0.2,
                    floatPhase: Math.random()*Math.PI*2, delay: Math.random()*0.5,
                    basePos: new THREE.Vector3(tp.x,tp.y,tp.z), iMat, gMat, goMat,
                    driftSpeed: 0.002+Math.random()*0.003, baseZ: tp.z, noGlow: isDefaultImage };
                spFloatingGroup.add(ig); spFloatingImages.push(ig);
            }
        }

        function startLetterTypingEffect(letterContent, cursor) {
            const page = LETTER_PAGES[currentLetterPage] || LETTER_PAGES[0];
            const text = page.text || '';
            const TYPING_SPEED_MS = 50;
            const NEWLINE_DELAY_MS = 5 * TYPING_SPEED_MS;
            const chars = Array.from(text);
            let currentIndex = 0;
            isTyping = true;
            function typeNextChar() {
                if (currentIndex < chars.length) {
                    const char = chars[currentIndex];
                    letterContent.insertBefore(document.createTextNode(char), cursor);
                    currentIndex++;
                    cursor.scrollIntoView({ block: 'nearest', behavior: 'auto' });
                    var extraSpace = Math.min(100, letterContent.clientHeight * 0.2);
                    letterContent.scrollTop = Math.min(
                        letterContent.scrollTop + extraSpace,
                        Math.max(0, letterContent.scrollHeight - letterContent.clientHeight)
                    );
                    const delay = char === '\n' ? NEWLINE_DELAY_MS : TYPING_SPEED_MS;
                    setTimeout(typeNextChar, delay);
                } else {
                    isTyping = false;
                    setTimeout(() => {
                        if (cursor) cursor.style.display = 'none';
                        letterContent.classList.add('typing-complete');
                        showLetterPageImage(page);
                        updateLetterNav();
                    }, 400);
                }
            }
            setTimeout(typeNextChar, 300);
        }

        function clamp(min, val, max) { return Math.max(min, Math.min(max, val)); }

        let fwRAF = null;
